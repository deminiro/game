services:
  db:
    image: postgres:16-alpine
    container_name: game_backend_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_backend
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d game_backend']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: game_backend_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api
      API_VERSION: '1'
      DATABASE_URL: postgresql://postgres:postgres@db:5432/game_backend?schema=public
      LOG_LEVEL: debug
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      ARGON2_MEMORY_COST: '19456'
      ARGON2_TIME_COST: '2'
      ARGON2_PARALLELISM: '1'
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
      - '9229:9229'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./test:/app/test
      - ./nest-cli.json:/app/nest-cli.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - api_node_modules:/app/node_modules

volumes:
  postgres_data:
  api_node_modules:
